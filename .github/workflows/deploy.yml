name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Backend Build and Syntax Check
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Lint & Compile Check
        run: |
          python -m py_compile backend/app/main.py

      # 2. Frontend Build Verification
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          
      - name: Frontend Build Verification
        run: |
          cd frontend
          # We pass dummy environment variables so Vite doesn't complain during build
          VITE_FIREBASE_API_KEY=dummy \
          VITE_FIREBASE_AUTH_DOMAIN=dummy \
          VITE_FIREBASE_PROJECT_ID=dummy \
          VITE_FIREBASE_STORAGE_BUCKET=dummy \
          VITE_FIREBASE_MESSAGING_SENDER_ID=dummy \
          VITE_FIREBASE_APP_ID=dummy \
          npm run build
